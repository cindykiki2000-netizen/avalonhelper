<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阿瓦隆網頁小幫手</title>
    <style>
        :root {
            --panel-bg: rgba(22, 33, 62, 0.9);
            --text-color: #e94560;
            --good-color: #4da6ff;
            --evil-color: #ff4d4d;
            --gold: #d4af37;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background-image: linear-gradient(rgba(10, 15, 25, 0.8), rgba(10, 15, 25, 0.8)), url('https://images.unsplash.com/photo-1605806616949-1e87b487cb2a?q=80&w=1920&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .screen {
            display: none;
            width: 100%;
            max-width: 400px;
            background-color: var(--panel-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 1px solid rgba(212, 175, 55, 0.3);
        }
        .screen.active {
            display: block;
        }
        h1, h2, h3 { color: var(--gold); text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        button {
            background-color: var(--text-color);
            color: white;
            border: none;
            padding: 12px 24px;
            margin: 10px 5px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        button:hover { background-color: #c8324a; transform: translateY(-2px); }
        .btn-gold { background-color: var(--gold); color: #1a1a2e; }
        .btn-gold:hover { background-color: #b5952f; }
        .btn-danger { background-color: transparent; border: 2px solid var(--evil-color); color: var(--evil-color); margin-top: 30px;}
        .btn-danger:hover { background-color: var(--evil-color); color: white; }
        
        .role-list { text-align: left; margin-bottom: 20px; }
        .role-item { margin: 5px 0; font-size: 16px; }
        .good { color: var(--good-color); font-weight: bold; text-shadow: 1px 1px 2px rgba(0,0,0,0.8);}
        .evil { color: var(--evil-color); font-weight: bold; text-shadow: 1px 1px 2px rgba(0,0,0,0.8);}
        
        select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            background-color: rgba(15, 23, 42, 0.8);
            color: white;
            border: 1px solid var(--gold);
            border-radius: 5px;
            font-size: 16px;
        }

        #setup-error { color: var(--evil-color); font-weight: bold; margin: 10px 0; min-height: 20px; }

        .card-container {
            border: 2px dashed var(--gold);
            border-radius: 15px;
            padding: 30px 20px;
            margin: 20px 0;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            position: relative;
            background-color: rgba(15, 23, 42, 0.9);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }
        .card-content {
            opacity: 0;
            transition: opacity 0.2s;
        }
        .card-content.revealed { opacity: 1; }
        .instruction {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--gold);
            font-size: 18px;
            pointer-events: none;
            transition: opacity 0.2s;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .instruction.hidden { opacity: 0; }
        
        .role-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 3px solid var(--gold);
            margin: 10px auto;
            object-fit: cover;
            display: block;
            box-shadow: 0 4px 15px rgba(0,0,0,0.8);
        }

        #player-info-text { font-size: 18px; line-height: 1.5; margin-top: 15px; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px;}
        
        .player-status-list { text-align: left; margin-top: 20px; border-top: 1px solid #555; padding-top: 10px;}
        .player-note-card {
            background: rgba(37, 42, 58, 0.8);
            margin: 10px 0;
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid var(--gold);
        }
        .note-input {
            width: 100%;
            box-sizing: border-box;
            background: rgba(30, 34, 48, 0.9);
            color: white;
            border: 1px solid #4c566a;
            border-radius: 5px;
            padding: 10px;
            font-size: 14px;
            margin-top: 8px;
        }
        .note-input:focus { outline: none; border-color: var(--gold); }
        
        .final-reveal-item {
            background: rgba(34, 34, 34, 0.9);
            margin: 5px 0;
            padding: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            border: 1px solid #444;
        }
    </style>
</head>
<body>

    <div id="setup-screen" class="screen active">
        <h1>阿瓦隆小幫手</h1>
        
        <div class="role-list">
            <h3>1. 選擇遊戲人數</h3>
            <select id="player-count">
                <option value="5">5 人局 (3正義 2邪惡)</option>
                <option value="6">6 人局 (4正義 2邪惡)</option>
                <option value="7">7 人局 (4正義 3邪惡)</option>
                <option value="8">8 人局 (5正義 3邪惡)</option>
                <option value="9">9 人局 (6正義 3邪惡)</option>
                <option value="10">10 人局 (6正義 4邪惡)</option>
            </select>

            <h3>2. 選擇特殊角色</h3>
            <p style="font-size: 12px; color: #ccc;">梅林與刺客為預設必備。其餘空位自動補齊。</p>
            <label class="role-item good"><input type="checkbox" checked disabled> 梅林 (正義)</label><br>
            <label class="role-item good"><input type="checkbox" id="role-percival" checked> 派西維爾 (正義)</label><br>
            <label class="role-item evil"><input type="checkbox" checked disabled> 刺客 (邪惡)</label><br>
            <label class="role-item evil"><input type="checkbox" id="role-morgana" checked> 莫甘娜 (邪惡)</label><br>
            <label class="role-item evil"><input type="checkbox" id="role-mordred"> 莫德雷德 (邪惡)</label><br>
            <label class="role-item evil"><input type="checkbox" id="role-oberon"> 奧伯倫 (邪惡)</label><br>
        </div>
        
        <div id="setup-error"></div>
        <button class="btn-gold" onclick="startGame()">開始分配角色</button>
    </div>

    <div id="pass-screen" class="screen">
        <h2 id="current-player-title">玩家 1 請接過手機</h2>
        <p>確認旁人沒有偷看後，長按下方區域查看身分</p>
        
        <div class="card-container" id="reveal-card">
            <div class="instruction" id="reveal-instruction">👆 長按此處顯示身分</div>
            <div class="card-content" id="card-content">
                <h2 id="player-role-name" style="margin-top: 0;">角色名稱</h2>
                <img id="player-role-img" class="role-img" src="" alt="角色圖片">
                <div id="player-info-text">你的專屬資訊將顯示於此。</div>
            </div>
        </div>
        
        <button id="next-player-btn" onclick="nextPlayer()" style="display:none;">我看完了，換下一位</button>
    </div>

    <div id="game-screen" class="screen">
        <h1>任務看板</h1>
        
        <div style="background: rgba(15, 23, 42, 0.8); padding: 15px; border-radius: 10px; border: 1px solid #444;">
            <h3 style="margin-top: 0;">本局出場角色清單</h3>
            <div id="active-roles-list" class="role-list" style="text-align: center;"></div>
        </div>

        <div class="player-status-list" id="player-status-list">
            <h3 style="margin: 0 0 15px 0;">玩家列表 (專屬筆記)</h3>
            </div>

        <button onclick="location.reload()" style="margin-top: 30px;">重新一局</button>
        <br>
        <button class="btn-danger" onclick="revealAll()">遊戲結束：查看所有人身分</button>

        <div id="final-reveal-area" style="display: none; margin-top: 20px;">
            <h3>真實身分揭曉</h3>
            <div id="final-reveal-list" style="text-align: left;"></div>
        </div>
    </div>

    <script>
        // 角色資料庫設定：已全數更新為您提供的直接連結（.jpg）
        const roleData = {
            merlin: { name: "梅林", isEvil: false, img: "https://i.postimg.cc/hjV0JNdY/7.jpg" },
            percival: { name: "派西維爾", isEvil: false, img: "https://i.postimg.cc/4dp1Kj98/6.jpg" },
            servant: { name: "亞瑟王的忠臣", isEvil: false, img: "https://i.postimg.cc/JnjQySkx/5.jpg" },
            assassin: { name: "刺客", isEvil: true, img: "https://i.postimg.cc/vmJzZGcz/4.jpg" },
            morgana: { name: "莫甘娜", isEvil: true, img: "https://i.postimg.cc/xdwR19c5/3.jpg" },
            mordred: { name: "莫德雷德", isEvil: true, img: "https://i.postimg.cc/XvR8YnpP/2.jpg" },
            oberon: { name: "奧伯倫", isEvil: true, img: "https://i.postimg.cc/fLYv319B/1.jpg" },
            minion: { name: "莫德雷德的爪牙", isEvil: true, img: "https://i.postimg.cc/XJW6LdYF/8.jpg" }
        };

        const rules = {
            5: { good: 3, evil: 2 },
            6: { good: 4, evil: 2 },
            7: { good: 4, evil: 3 },
            8: { good: 5, evil: 3 },
            9: { good: 6, evil: 3 },
            10: { good: 6, evil: 4 }
        };

        let players = [];
        let currentPlayerIndex = 0;

        function startGame() {
            const errorEl = document.getElementById('setup-error');
            errorEl.innerText = "";
            currentPlayerIndex = 0; 
            players = [];

            const playerCount = parseInt(document.getElementById('player-count').value);
            const ratio = rules[playerCount];

            let goodRoles = ['merlin'];
            let evilRoles = ['assassin'];

            if(document.getElementById('role-percival').checked) goodRoles.push('percival');
            if(document.getElementById('role-morgana').checked) evilRoles.push('morgana');
            if(document.getElementById('role-mordred').checked) evilRoles.push('mordred');
            if(document.getElementById('role-oberon').checked) evilRoles.push('oberon');

            if(goodRoles.length > ratio.good || evilRoles.length > ratio.evil) {
                errorEl.innerText = `⚠️ 無法開始：${playerCount} 人局的上限是 ${ratio.good} 名正義與 ${ratio.evil} 名邪惡。請調整特殊角色數量！`;
                return;
            }

            while(goodRoles.length < ratio.good) goodRoles.push('servant');
            while(evilRoles.length < ratio.evil) evilRoles.push('minion');

            let selectedRoles = goodRoles.concat(evilRoles);
            selectedRoles = selectedRoles.sort(() => Math.random() - 0.5);

            players = selectedRoles.map((roleKey, index) => {
                return {
                    id: index + 1,
                    roleKey: roleKey,
                    role: roleData[roleKey],
                    info: ""
                };
            });

            generateInfo();

            document.getElementById('setup-screen').classList.remove('active');
            document.getElementById('pass-screen').classList.add('active');
            showPlayerPassScreen();
        }

        function generateInfo() {
            const teamEvil = players.filter(p => p.role.isEvil && p.roleKey !== 'oberon').map(p => p.id + "號");
            const seenByMerlin = players.filter(p => p.role.isEvil && p.roleKey !== 'mordred').map(p => p.id + "號");
            const seenByPercival = players.filter(p => p.roleKey === 'merlin' || p.roleKey === 'morgana').map(p => p.id + "號");

            players.forEach(p => {
                if (p.roleKey === 'merlin') {
                    p.info = `你感應到了邪惡力量。<br>邪惡陣營玩家是：<br><strong class="evil">${seenByMerlin.join('、') || '無'}</strong>`;
                } else if (p.roleKey === 'percival') {
                    p.info = `你看到了兩位強大法法師(梅林或莫甘娜)。<br>他們分別是：<br><strong class="good">${seenByPercival.join('、') || '無'}</strong>`;
                } else if (p.role.isEvil && p.roleKey !== 'oberon') {
                    const otherEvils = teamEvil.filter(id => id !== p.id + "號");
                    if(otherEvils.length > 0) {
                        p.info = `你的邪惡同夥是：<br><strong class="evil">${otherEvils.join('、')}</strong>`;
                    } else {
                        p.info = "你是唯一的邪惡陣營 (或其他人是奧伯倫)。";
                    }
                } else if (p.roleKey === 'oberon') {
                    p.info = "你是奧伯倫。你不知道其他邪惡同夥是誰，他們也不知道你。";
                } else {
                    p.info = "你是一般忠臣，沒有額外資訊，請努力從發言中找出隊友！";
                }
            });
        }

        function showPlayerPassScreen() {
            const player = players[currentPlayerIndex];
            document.getElementById('current-player-title').innerText = `玩家 ${player.id} 請接過手機`;
            
            const roleNameEl = document.getElementById('player-role-name');
            roleNameEl.innerText = player.role.name;
            roleNameEl.className = player.role.isEvil ? 'evil' : 'good';
            
            const roleImgEl = document.getElementById('player-role-img');
            roleImgEl.src = player.role.img;
            
            document.getElementById('player-info-text').innerHTML = player.info;
            document.getElementById('next-player-btn').style.display = 'none';
            
            document.getElementById('card-content').classList.remove('revealed');
            document.getElementById('reveal-instruction').classList.remove('hidden');
        }

        const card = document.getElementById('reveal-card');
        const cardContent = document.getElementById('card-content');
        const instruction = document.getElementById('reveal-instruction');

        function revealCard() {
            cardContent.classList.add('revealed');
            instruction.classList.add('hidden');
            document.getElementById('next-player-btn').style.display = 'inline-block';
        }

        function hideCard() {
            cardContent.classList.remove('revealed');
            instruction.classList.remove('hidden');
        }

        card.addEventListener('mousedown', revealCard);
        card.addEventListener('mouseup', hideCard);
        card.addEventListener('mouseleave', hideCard);
        card.addEventListener('touchstart', revealCard);
        card.addEventListener('touchend', hideCard);

        function nextPlayer() {
            currentPlayerIndex++;
            if (currentPlayerIndex < players.length) {
                showPlayerPassScreen();
            } else {
                showGameScreen();
            }
        }

        function showGameScreen() {
            document.getElementById('pass-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');

            const activeRoles = players.map(p => p.role).sort(() => Math.random() - 0.5);
            const roleListHTML = activeRoles.map(r => 
                `<span class="${r.isEvil ? 'evil' : 'good'}" style="margin: 5px 10px; display: inline-block;">${r.name}</span>`
            ).join('');
            document.getElementById('active-roles-list').innerHTML = roleListHTML;

            const playerListHTML = players.map(p => 
                `<div class="player-note-card">
                    <div style="font-weight: bold; color: var(--gold); font-size: 16px;">玩家 ${p.id}</div>
                    <input type="text" class="note-input" placeholder="備註 (例如: 疑似梅林、發言不好)...">
                </div>`
            ).join('');
            
            document.getElementById('player-status-list').innerHTML += playerListHTML;
        }

        function revealAll() {
            if(confirm("確定要揭曉所有人的真實身分嗎？（如果遊戲還沒結束，請按取消以免破壞體驗）")) {
                const revealArea = document.getElementById('final-reveal-area');
                const listEl = document.getElementById('final-reveal-list');
                
                const sortedPlayers = [...players].sort((a, b) => a.id - b.id);
                
                listEl.innerHTML = sortedPlayers.map(p => 
                    `<div class="final-reveal-item">
                        <span>玩家 ${p.id}</span>
                        <strong class="${p.role.isEvil ? 'evil' : 'good'}">${p.role.name}</strong>
                    </div>`
                ).join('');
                
                revealArea.style.display = 'block';
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }
        }
    </script>
</body>
</html>
